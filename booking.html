<section id="booking" class="booking-section">
    <div class="booking-container">

        <div class="booking-header">
            <h2>Book The Blue Light Choir 🎶</h2>
            <p>
                Fill in the form below to book Motheo Wa Tumelo Gospel Choir for your event.
            </p>
        </div>

        <form id="bookingForm" class="booking-form">

            <!-- PERSONAL INFO -->
            <div class="form-grid">

                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" name="name" placeholder="Enter your full name" required>
                </div>

                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="example@gmail.com" required>
                </div>

                <div class="input-group">
                    <label>Phone Number</label>
                    <input type="tel" name="phone" placeholder="063 000 0000" required>
                </div>

                <div class="input-group">
                    <label>Event Type</label>
                    <select name="event" required>
                        <option value="">Select Event Type</option>
                        <option>Wedding</option>
                        <option>Church Service</option>
                        <option>Funeral</option>
                        <option>Festival</option>
                        <option>Concert</option>
                        <option>Community Event</option>
                        <option>Birthday Celebration</option>
                        <option>Other</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Event Date</label>
                    <input type="date" name="date" required>
                </div>

                <div class="input-group">
                    <label>Event Time</label>
                    <input type="time" name="time" required>
                </div>

                <div class="input-group full-width">
                    <label>Venue / Location</label>
                    <input type="text" name="location" placeholder="Enter event location" required>
                </div>

                <div class="input-group full-width">
                    <label>Additional Information</label>
                    <textarea name="message" rows="5" placeholder="Tell us more about your event..."></textarea>
                </div>

            </div>

            <!-- BUTTONS -->
            <div class="booking-buttons">
 <a href="https://wa.me/27636404100" target="_blank" class="whatsapp-btn">
                    Book on WhatsApp
                </a>
            </div>
<p id="form-status"></p>
</form>
</div>

<script>
function scrollToSection(id){
 document.getElementById(id).scrollIntoView();
}

function submitBooking(e){
 e.preventDefault();
 alert("Booking saved (connect to database next)");
}

document.getElementById("bookingForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const status = document.getElementById("form-status");

    status.innerHTML = "⏳ Sending booking request...";

    setTimeout(() => {
        status.innerHTML = "✅ Booking request sent successfully! We will contact you soon.";

        this.reset();

    }, 1500);
});
</script>
