<script>
function scrollToSection(id){
 document.getElementById(id).scrollIntoView();
}

  let slideIndex = 0;
  const slides = document.querySelector('.slides');
  const totalSlides = document.querySelectorAll('.slide').length;

  function moveSlide(direction) {
    slideIndex += direction;
    if (slideIndex < 0) slideIndex = totalSlides - 1;
    if (slideIndex >= totalSlides) slideIndex = 0;

    const slideWidth = document.querySelector('.slide').offsetWidth + 20; // includes gap
    slides.style.transform = `translateX(-${slideWidth * slideIndex}px)`;
  }

let vIndex = 0;
let vSlides = document.getElementsByClassName("video-slide");

function showVideo() {
    for (let i = 0; i < vSlides.length; i++) {
        vSlides[i].style.display = "none";
    }
    vSlides[vIndex].style.display = "block";
}

function nextVideo() {
    vIndex++;
    if (vIndex >= vSlides.length) vIndex = 0;
    showVideo();
}

function prevVideo() {
    vIndex--;
    if (vIndex < 0) vIndex = vSlides.length - 1;
    showVideo();
}

window.onload = function() {
    showVideo();
};
</script>
